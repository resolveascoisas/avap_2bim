<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Resultados AVAP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #0f172a;
            --secondary: #334155;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --border: #e2e8f0;
            
            --red-bg: #fee2e2; --red-text: #b91c1c;
            --yellow-bg: #fef9c3; --yellow-text: #a16207;
            --green-bg: #dcfce7; --green-text: #15803d;
            --blue-bg: #e0f2fe; --blue-text: #0369a1;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .dashboard-container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); min-height: 80vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .header p { margin: 4px 0 0 0; font-size: 14px; color: var(--secondary); }

        /* Abas de Navegação */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid var(--border); background: #f1f5f9; border-radius: 6px; font-weight: 600; font-size: 14px; color: var(--secondary); transition: all 0.2s; }
        .tab-btn:hover { background: #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Controles (Dropdown) */
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .controls select { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: 'Inter'; font-size: 14px; min-width: 250px; outline: none; }

        /* Tabela */
        .table-wrapper { overflow-x: auto; margin-bottom: 30px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th, .data-table td { border: 1px solid var(--border); padding: 8px 6px; text-align: center; vertical-align: middle; white-space: nowrap; }
        .data-table thead th { background: var(--primary); color: white; font-weight: 600; padding: 12px 6px; white-space: normal; }
        .col-text { text-align: left !important; font-weight: 600; background: #f8fafc; white-space: normal !important; min-width: 180px; }
        .col-total { font-weight: 700; border-left: 2px solid #94a3b8 !important; }
        .row-total td { border-top: 2px solid var(--primary); font-weight: 700; background: #f1f5f9; }

        /* Semáforo Customizado */
        .cell-red { background: var(--red-bg) !important; color: var(--red-text) !important; font-weight: 700; }
        .cell-yellow { background: var(--yellow-bg) !important; color: var(--yellow-text) !important; font-weight: 700; }
        .cell-green { background: var(--green-bg) !important; color: var(--green-text) !important; font-weight: 700; }
        .cell-blue { background: var(--blue-bg) !important; color: var(--blue-text) !important; font-weight: 700; }
        .cell-empty { background: #f8fafc; color: #cbd5e1; }

        /* Gráfico */
        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

        /* Loading */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 18px; font-weight: 600; color: var(--primary);
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingText">Iniciando Dashboard...</div>
    <div id="loadingSubtext" style="font-size: 13px; font-weight: 400; color: var(--secondary); margin-top: 5px;">Baixando dados da rede</div>
</div>

<div class="dashboard-container">
    <div class="header">
        <div>
            <h1>Painel Analítico AVAP</h1>
            <p>Consolidação de Múltiplas Escolas e Turmas</p>
        </div>
    </div>

    <div class="tabs">
        <button id="btnTabGeral" class="tab-btn active" onclick="setModo('GERAL')">📊 Visão Geral da Rede</button>
        <button id="btnTabEscola" class="tab-btn" onclick="setModo('ESCOLA')">🏫 Visão por Escola / Turma</button>
    </div>

    <div id="escolaControls" class="controls" style="display: none;">
        <label style="font-weight: 600; font-size: 14px;">Selecione a Unidade Escolar:</label>
        <select id="escolaSelect" onchange="renderizarEscola()"></select>
    </div>

    <div class="table-wrapper" id="tabelaArea"></div>
    
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    // =====================================================================
    // CONFIGURAÇÃO DOS ARQUIVOS (PASTA 'dados/' NO GITHUB)
    // =====================================================================
    const CONFIG = {
        ARQUIVO_MATRICULAS_REDE: "dados/AVARE.csv",
        ESCOLAS: [
            "ABILIO RAPOSO FERRAZ JUNIOR",
            "ASSENTAMENTO ZUMBI DOS PALMARES",
            "AVELINO APARECIDO RIBEIRO DOUTOR",
            "BENE ANDRADE DONA",
            "CELSO FERREIRA DA SILVA PROFESSOR",
            "COTA LEONEL DONA",
            "DIMAS MOZART E SILVA PROFESSOR",
            "EMILIO IMMOOS PADRE",
            "ERUCE PAULUCCI PROFESSOR",
            "GUIDO DIAS DE ALMEIDA PROFESSOR",
            "JOAO CRUZ CORONEL",
            "JOAO MICHELIN",
            "JOAO TEIXEIRA DE ARAUJO PROFESSOR",
            "JOSE APARECIDO CASTELUCCI PROFESSOR",
            "JOSE LEITE PINHEIRO PROFESSOR",
            "JOSE PENNA",
            "JOSE PIRES DE CARVALHO DOUTOR",
            "MARIA IZABEL CRUZ PIMENTEL DONA",
            "MATILDE VIEIRA",
            "PAULO ARAUJO NOVAES DOUTOR",
            "PAULO DELICIO",
            "PEDRO BENTO ALVES",
            "PROFESSORA MARIANA APARECIDA TODESCATO",
            "SANDRA APARECIDA DE ARAUJO PROFESSORA"
        ]
    };

    // Variáveis Globais de Estado
    let dadosEscolasCache = {}; // Armazena os JSONs extraídos dos Excel
    let matriculasRede = {}; // { "NOME DA ESCOLA": total }
    let matriculasTurmasCache = {}; // { "NOME DA ESCOLA": { "TURMA A": total, "TURMA B": total } }
    let disciplinasGlobais = new Set();
    let modoAtual = 'GERAL';
    let chartInstance = null;

    // --- INICIALIZAÇÃO ---
    window.onload = async () => {
        await carregarMatriculasGerais();
        await carregarTodasPlanilhasExcel();
        
        // Popula o dropdown
        const select = document.getElementById('escolaSelect');
        CONFIG.ESCOLAS.forEach(nome => {
            if (dadosEscolasCache[nome]) {
                select.innerHTML += `<option value="${nome}">${nome}</option>`;
            }
        });

        document.getElementById('loadingOverlay').style.display = 'none';
        setModo('GERAL');
    };

    // --- FUNÇÕES DE CARREGAMENTO (FETCH) ---
    async function fetchAsArrayBuffer(url) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`Arquivo não encontrado: ${url}`);
        return await resp.arrayBuffer();
    }

    async function carregarMatriculasGerais() {
        try {
            const buffer = await fetchAsArrayBuffer(CONFIG.ARQUIVO_MATRICULAS_REDE);
            const decoder = new TextDecoder('utf-8');
            const csvStr = decoder.decode(buffer);
            const workbook = XLSX.read(csvStr, {type: 'string'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
            
            jsonData.forEach(row => {
                const keys = Object.keys(row);
                let eKey = keys.find(k => k.toLowerCase().includes('escola') || k.toLowerCase().includes('unidade')) || keys[0];
                let mKey = keys.find(k => k.toLowerCase().includes('matricula') || k.toLowerCase().includes('total')) || keys[keys.length - 1];
                
                if (row[eKey] && row[mKey]) {
                    let nomeLimpo = String(row[eKey]).toUpperCase().replace(/\s*-\s*\d+$/, '').trim();
                    matriculasRede[nomeLimpo] = parseInt(row[mKey]) || 0;
                }
            });
        } catch(e) {
            console.warn("Aviso: Arquivo de matrículas gerais (AVARE.csv) não carregado ou ausente.", e);
        }
    }

    async function carregarTodasPlanilhasExcel() {
        for (let i = 0; i < CONFIG.ESCOLAS.length; i++) {
            const nomeEscola = CONFIG.ESCOLAS[i];
            const url = `dados/${nomeEscola}.xlsx`;
            document.getElementById('loadingSubtext').innerText = `Processando: ${nomeEscola} (${i+1}/${CONFIG.ESCOLAS.length})`;
            
            try {
                const buffer = await fetchAsArrayBuffer(url);
                const workbook = XLSX.read(buffer, {type: 'array'});
                let turmasData = [];

                workbook.SheetNames.forEach(sheetName => {
                    const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {defval: ""});
                    if (sheetData.length === 0) return;
                    
                    const classCol = Object.keys(sheetData[0])[0];
                    sheetData.forEach(row => {
                        if (row[classCol] && row["Total de Alunos"]) {
                            turmasData.push(row);
                            
                            // Mapeia disciplinas existentes
                            Object.keys(row).forEach(h => {
                                if (h.includes("Acertos em")) {
                                    const match = h.match(/Acertos em (.*?)\s*\(/);
                                    if(match) disciplinasGlobais.add(match[1].trim());
                                }
                            });
                        }
                    });
                });
                
                if (turmasData.length > 0) {
                    dadosEscolasCache[nomeEscola] = turmasData;
                }
            } catch(e) {
                console.error(`Falha ao ler Excel de ${nomeEscola}:`, e);
            }
        }
    }

    async function carregarMatriculasTurma(nomeEscola) {
        if (matriculasTurmasCache[nomeEscola]) return; // Já carregou antes
        
        matriculasTurmasCache[nomeEscola] = {};
        const url = `dados/${nomeEscola}.csv`;
        
        try {
            const buffer = await fetchAsArrayBuffer(url);
            const decoder = new TextDecoder('utf-8');
            const csvStr = decoder.decode(buffer);
            const workbook = XLSX.read(csvStr, {type: 'string'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
            
            jsonData.forEach(row => {
                const keys = Object.keys(row);
                let tKey = keys.find(k => k.toLowerCase().includes('turma') || k.toLowerCase().includes('sala')) || keys[0];
                let mKey = keys.find(k => k.toLowerCase().includes('matricula') || k.toLowerCase().includes('total')) || keys[keys.length - 1];
                
                if (row[tKey] && row[mKey]) {
                    let turmaLimpa = String(row[tKey]).toUpperCase().trim();
                    matriculasTurmasCache[nomeEscola][turmaLimpa] = parseInt(row[mKey]) || 0;
                }
            });
        } catch (e) {
            console.warn(`Aviso: Arquivo de turmas ${nomeEscola}.csv não encontrado. Participação das salas assumirá 100%.`);
        }
    }

    // --- LÓGICA DE NAVEGAÇÃO ---
    function setModo(modo) {
        modoAtual = modo;
        document.getElementById('btnTabGeral').classList.toggle('active', modo === 'GERAL');
        document.getElementById('btnTabEscola').classList.toggle('active', modo === 'ESCOLA');
        document.getElementById('escolaControls').style.display = modo === 'ESCOLA' ? 'flex' : 'none';
        
        if (modo === 'GERAL') {
            renderizarGeral();
        } else {
            renderizarEscola(); // Aciona automaticamente com a primeira escola do select
        }
    }

    // --- REGRAS DO SEMÁFORO (CONFORME SOLICITADO: <30 Vermelho, >=50 Verde) ---
    function getSemaforoClass(pct) {
        if (pct < 0 || isNaN(pct)) return "cell-empty";
        if (pct < 30) return "cell-red";
        if (pct >= 50) return "cell-green";
        return "cell-yellow";
    }

    function getChartColor(pct) {
        if (pct < 0 || isNaN(pct)) return "#cbd5e1";
        if (pct < 30) return "#ef4444"; // bg-red-500
        if (pct >= 50) return "#22c55e"; // bg-green-500
        return "#eab308"; // bg-yellow-500
    }

    function calcularQtdQuestoes(headerString) {
        const match = headerString.match(/\((Questões.*?)\)/);
        if (match) return (match[1].match(/,/g) || []).length + 1;
        return 1;
    }

    // --- RENDERIZAÇÃO: VISÃO GERAL ---
    function renderizarGeral() {
        const discArray = Array.from(disciplinasGlobais).sort();
        let htmlRows = "";
        let labels = [];
        let dataPcts = [];
        let bgColors = [];

        let globAlunos = 0, globMatriculas = 0, globAcertos = 0, globPossiveis = 0;
        let globDisc = {};
        discArray.forEach(d => globDisc[d] = { acertos: 0, possiveis: 0 });

        const escolasTratadas = Object.keys(dadosEscolasCache).map(nome => {
            const rawData = dadosEscolasCache[nome];
            let escAlunos = 0;
            let escAcertos = 0, escPossiveis = 0;
            let escDisc = {};
            discArray.forEach(d => escDisc[d] = { acertos: 0, possiveis: 0 });

            let turmasContadas = new Set();

            rawData.forEach(row => {
                const turmaNome = String(row[Object.keys(row)[0]]).toUpperCase().trim();
                const pres = parseInt(row["Total de Alunos"]) || 0;
                
                if (!turmasContadas.has(turmaNome)) {
                    escAlunos += pres;
                    turmasContadas.add(turmaNome);
                }

                Object.keys(row).forEach(h => {
                    if (h.includes("Acertos em")) {
                        const match = h.match(/Acertos em (.*?)\s*\(/);
                        if (match) {
                            const dNome = match[1].trim();
                            const acertos = parseInt(row[h]) || 0;
                            const qCount = calcularQtdQuestoes(h);
                            const possiveis = pres * qCount;

                            if (escDisc[dNome]) {
                                escDisc[dNome].acertos += acertos;
                                escDisc[dNome].possiveis += possiveis;
                            }
                            escAcertos += acertos;
                            escPossiveis += possiveis;
                        }
                    }
                });
            });

            const matrics = matriculasRede[nome] || escAlunos;
            const pctPart = matrics > 0 ? Math.min((escAlunos / matrics) * 100, 100) : 100;
            const mediaGeral = escPossiveis > 0 ? (escAcertos / escPossiveis) * 100 : -1;

            return { nome, escAlunos, matrics, pctPart, escDisc, mediaGeral, escAcertos, escPossiveis };
        });

        // Ordena por nome
        escolasTratadas.sort((a, b) => a.nome.localeCompare(b.nome));

        escolasTratadas.forEach(e => {
            globAlunos += e.escAlunos;
            globMatriculas += e.matrics;
            globAcertos += e.escAcertos;
            globPossiveis += e.escPossiveis;

            htmlRows += `<tr>
                <td class="col-text">${e.nome}</td>
                <td>${e.escAlunos}</td>
                <td>${e.matrics === e.escAlunos ? "-" : e.matrics}</td>
                <td class="cell-blue">${e.pctPart.toFixed(1).replace('.',',')}%</td>`;

            discArray.forEach(d => {
                globDisc[d].acertos += e.escDisc[d].acertos;
                globDisc[d].possiveis += e.escDisc[d].possiveis;
                
                const pct = e.escDisc[d].possiveis > 0 ? (e.escDisc[d].acertos / e.escDisc[d].possiveis) * 100 : -1;
                htmlRows += `<td class="${getSemaforoClass(pct)}">${pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%"}</td>`;
            });

            htmlRows += `<td class="col-total ${getSemaforoClass(e.mediaGeral)}">${e.mediaGeral === -1 ? "-" : e.mediaGeral.toFixed(1).replace('.',',')+"%"}</td></tr>`;
            
            // Dados para o Gráfico
            labels.push(e.nome.split(' ').slice(0,2).join(' ')); // Encurta nome p/ grafico
            dataPcts.push(e.mediaGeral > -1 ? e.mediaGeral.toFixed(1) : 0);
            bgColors.push(getChartColor(e.mediaGeral));
        });

        // Cabeçalho da Tabela
        let headerHtml = `<table class="data-table"><thead><tr>
            <th style="min-width: 250px;">Escola</th>
            <th>Alunos<br>(Presentes)</th>
            <th>Total<br>Matric.</th>
            <th>Particip.<br>(%)</th>`;
        discArray.forEach(d => headerHtml += `<th>${d}</th>`);
        headerHtml += `<th>Média<br>Geral</th></tr></thead><tbody>`;

        // Linha Totalizadora
        let tPart = globMatriculas > 0 ? (globAlunos / globMatriculas) * 100 : 0;
        let tMedia = globPossiveis > 0 ? (globAcertos / globPossiveis) * 100 : -1;
        let totalRow = `<tr class="row-total">
            <td class="col-text">MÉDIA GLOBAL DA REDE</td>
            <td>${globAlunos}</td><td>${globMatriculas}</td><td class="cell-blue">${tPart.toFixed(1).replace('.',',')}%</td>`;
        
        discArray.forEach(d => {
            const pct = globDisc[d].possiveis > 0 ? (globDisc[d].acertos / globDisc[d].possiveis) * 100 : -1;
            totalRow += `<td class="${getSemaforoClass(pct)}">${pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%"}</td>`;
        });
        totalRow += `<td class="col-total ${getSemaforoClass(tMedia)}">${tMedia === -1 ? "-" : tMedia.toFixed(1).replace('.',',')+"%"}</td></tr>`;

        document.getElementById('tabelaArea').innerHTML = headerHtml + totalRow + htmlRows + `</tbody></table>`;
        desenharGrafico(labels, dataPcts, bgColors, "Média Geral por Escola (%)");
    }

    // --- RENDERIZAÇÃO: VISÃO POR ESCOLA (TURMAS) ---
    async function renderizarEscola() {
        const nomeEscola = document.getElementById('escolaSelect').value;
        if (!nomeEscola || !dadosEscolasCache[nomeEscola]) return;
        
        await carregarMatriculasTurma(nomeEscola);
        const matsTurma = matriculasTurmasCache[nomeEscola] || {};

        const rawData = dadosEscolasCache[nomeEscola];
        const discArray = Array.from(disciplinasGlobais).sort();
        
        let turmasMap = {};

        // Agrupa por Turma
        rawData.forEach(row => {
            const tNome = String(row[Object.keys(row)[0]]).toUpperCase().trim();
            const pres = parseInt(row["Total de Alunos"]) || 0;
            
            if (!turmasMap[tNome]) {
                turmasMap[tNome] = { pres: pres, acertos: 0, possiveis: 0, disc: {} };
                discArray.forEach(d => turmasMap[tNome].disc[d] = { acertos: 0, possiveis: 0 });
            }

            Object.keys(row).forEach(h => {
                if (h.includes("Acertos em")) {
                    const match = h.match(/Acertos em (.*?)\s*\(/);
                    if (match) {
                        const dNome = match[1].trim();
                        const acertos = parseInt(row[h]) || 0;
                        const possiveis = pres * calcularQtdQuestoes(h);

                        if (turmasMap[tNome].disc[dNome]) {
                            turmasMap[tNome].disc[dNome].acertos += acertos;
                            turmasMap[tNome].disc[dNome].possiveis += possiveis;
                        }
                        turmasMap[tNome].acertos += acertos;
                        turmasMap[tNome].possiveis += possiveis;
                    }
                }
            });
        });

        let labels = [];
        let dataPcts = [];
        let bgColors = [];
        let htmlRows = "";

        let globAlunos = 0, globMatriculas = 0, globAcertos = 0, globPossiveis = 0;
        let globDisc = {};
        discArray.forEach(d => globDisc[d] = { acertos: 0, possiveis: 0 });

        Object.keys(turmasMap).sort().forEach(tNome => {
            const t = turmasMap[tNome];
            
            // Tenta achar a matricula. Fallback parcial, ou igual aos presentes
            let mat = matsTurma[tNome];
            if (!mat) {
                const chaveAprx = Object.keys(matsTurma).find(k => k.includes(tNome) || tNome.includes(k));
                mat = chaveAprx ? matsTurma[chaveAprx] : t.pres;
            }

            const pctPart = mat > 0 ? Math.min((t.pres / mat) * 100, 100) : 100;
            const mediaT = t.possiveis > 0 ? (t.acertos / t.possiveis) * 100 : -1;

            globAlunos += t.pres; globMatriculas += mat; globAcertos += t.acertos; globPossiveis += t.possiveis;

            htmlRows += `<tr>
                <td class="col-text">${tNome}</td>
                <td>${t.pres}</td><td>${mat === t.pres ? "-" : mat}</td>
                <td class="cell-blue">${pctPart.toFixed(1).replace('.',',')}%</td>`;

            discArray.forEach(d => {
                globDisc[d].acertos += t.disc[d].acertos;
                globDisc[d].possiveis += t.disc[d].possiveis;
                const pct = t.disc[d].possiveis > 0 ? (t.disc[d].acertos / t.disc[d].possiveis) * 100 : -1;
                htmlRows += `<td class="${getSemaforoClass(pct)}">${pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%"}</td>`;
            });

            htmlRows += `<td class="col-total ${getSemaforoClass(mediaT)}">${mediaT === -1 ? "-" : mediaT.toFixed(1).replace('.',',')+"%"}</td></tr>`;

            // Encurta nome da turma para grafico (Ex: tira "INTEGRAL 7H")
            labels.push(tNome.replace(/(INTEGRAL|MANHA|TARDE|ANUAL|T1|T2|7H|9H|\-|\d{8,})/g, '').trim().substring(0,12));
            dataPcts.push(mediaT > -1 ? mediaT.toFixed(1) : 0);
            bgColors.push(getChartColor(mediaT));
        });

        let headerHtml = `<table class="data-table"><thead><tr>
            <th style="min-width: 250px;">Turma/Sala</th>
            <th>Alunos<br>(Presentes)</th><th>Total<br>Matric.</th><th>Particip.<br>(%)</th>`;
        discArray.forEach(d => headerHtml += `<th>${d}</th>`);
        headerHtml += `<th>Média<br>Turma</th></tr></thead><tbody>`;

        let tPart = globMatriculas > 0 ? (globAlunos / globMatriculas) * 100 : 0;
        let tMedia = globPossiveis > 0 ? (globAcertos / globPossiveis) * 100 : -1;
        let totalRow = `<tr class="row-total">
            <td class="col-text">TOTAL DA UNIDADE</td>
            <td>${globAlunos}</td><td>${globMatriculas}</td><td class="cell-blue">${tPart.toFixed(1).replace('.',',')}%</td>`;
        discArray.forEach(d => {
            const pct = globDisc[d].possiveis > 0 ? (globDisc[d].acertos / globDisc[d].possiveis) * 100 : -1;
            totalRow += `<td class="${getSemaforoClass(pct)}">${pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%"}</td>`;
        });
        totalRow += `<td class="col-total ${getSemaforoClass(tMedia)}">${tMedia === -1 ? "-" : tMedia.toFixed(1).replace('.',',')+"%"}</td></tr>`;

        document.getElementById('tabelaArea').innerHTML = headerHtml + totalRow + htmlRows + `</tbody></table>`;
        desenharGrafico(labels, dataPcts, bgColors, `Média Geral por Turma - ${nomeEscola}`);
    }

    // --- GRÁFICO (CHART.JS) ---
    function desenharGrafico(labels, data, colors, title) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { type: 'line', label: 'Meta Ideal (50%)', data: Array(labels.length).fill(50), borderColor: '#15803d', borderWidth: 2, borderDash: [5, 5], fill: false, pointRadius: 0 },
                    { type: 'line', label: 'Alerta Vermelho (30%)', data: Array(labels.length).fill(30), borderColor: '#b91c1c', borderWidth: 1, borderDash: [2, 2], fill: false, pointRadius: 0 },
                    { type: 'bar', label: title, data: data, backgroundColor: colors, borderRadius: 4 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: 'Acertos (%)' } } },
                plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: function(c) { return c.raw + '%'; } } } }
            }
        });
    }
</script>
</body>
</html>
