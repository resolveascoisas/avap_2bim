<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico AVAP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #0f172a; --secondary: #334155; --accent: #3b82f6; --bg: #f8fafc; --border: #e2e8f0;
            --red-bg: #fee2e2; --red-text: #b91c1c;
            --yellow-bg: #fef9c3; --yellow-text: #a16207;
            --green-bg: #dcfce7; --green-text: #15803d;
            --blue-bg: #e0f2fe; --blue-text: #0369a1;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .dashboard-container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); min-height: 80vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .header p { margin: 4px 0 0 0; font-size: 14px; color: var(--secondary); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid var(--border); background: #f1f5f9; border-radius: 6px; font-weight: 600; font-size: 14px; color: var(--secondary); transition: all 0.2s; }
        .tab-btn:hover { background: #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .controls select { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: 'Inter'; font-size: 14px; min-width: 250px; outline: none; cursor: pointer; }

        .table-wrapper { overflow-x: auto; margin-bottom: 30px; border-radius: 8px; border: 1px solid var(--border); }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th, .data-table td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 8px 6px; text-align: center; vertical-align: middle; white-space: nowrap; }
        
        /* Cabeçalhos Clicáveis */
        .data-table thead th { background: var(--primary); color: white; font-weight: 600; padding: 12px 6px; white-space: normal; cursor: pointer; user-select: none; transition: background 0.2s; }
        .data-table thead th:hover { background: #1e293b; }
        .sort-icon { display: inline-block; margin-left: 5px; font-size: 10px; color: #94a3b8; }
        .th-active { background: var(--accent) !important; }
        .th-active .sort-icon { color: white; }

        .col-text { text-align: left !important; font-weight: 600; background: #f8fafc; white-space: normal !important; min-width: 180px; }
        .col-total { font-weight: 700; border-left: 2px solid #94a3b8 !important; }
        .row-total td { border-top: 2px solid var(--primary); font-weight: 700; background: #f1f5f9; cursor: default; }

        .cell-red { background: var(--red-bg) !important; color: var(--red-text) !important; font-weight: 700; }
        .cell-yellow { background: var(--yellow-bg) !important; color: var(--yellow-text) !important; font-weight: 700; }
        .cell-green { background: var(--green-bg) !important; color: var(--green-text) !important; font-weight: 700; }
        .cell-blue { background: var(--blue-bg) !important; color: var(--blue-text) !important; font-weight: 700; }
        .cell-empty { background: #f8fafc; color: #cbd5e1; }

        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 18px; font-weight: 600; color: var(--primary);
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingText">Sincronizando Base de Dados...</div>
    <div id="loadingSubtext" style="font-size: 13px; font-weight: 400; color: var(--secondary); margin-top: 5px;">Aguarde, processando as 24 escolas.</div>
</div>

<div class="dashboard-container">
    <div class="header">
        <div>
            <h1>Painel Analítico AVAP</h1>
            <p>Clique no título de qualquer coluna para ordenar os resultados</p>
        </div>
    </div>

    <div class="tabs">
        <button id="btnTabGeral" class="tab-btn active" onclick="setModo('GERAL')">📊 Visão Geral da Rede</button>
        <button id="btnTabEscola" class="tab-btn" onclick="setModo('ESCOLA')">🏫 Granulação por Turma</button>
    </div>

    <div id="escolaControls" class="controls" style="display: none;">
        <label style="font-weight: 600; font-size: 14px;">Filtrar Unidade Escolar:</label>
        <select id="escolaSelect" onchange="resetSortAndRender()"></select>
    </div>

    <div class="table-wrapper" id="tabelaArea"></div>
    
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    // =====================================================================
    // CONFIGURAÇÃO DOS ARQUIVOS (PASTA 'dados/' NO GITHUB)
    // =====================================================================
    const CONFIG = {
        ARQUIVO_MATRICULAS_REDE: "dados/AVARE.csv",    // Matrículas por Escola
        ARQUIVO_MATRICULAS_TURMA: "dados/ESCOLAS.csv", // Matrículas por Turma (Todos juntos)
        ESCOLAS: [
            "ABILIO RAPOSO FERRAZ JUNIOR",
            "ASSENTAMENTO ZUMBI DOS PALMARES",
            "AVELINO APARECIDO RIBEIRO DOUTOR",
            "BENE ANDRADE DONA",
            "CELSO FERREIRA DA SILVA PROFESSOR",
            "COTA LEONEL DONA",
            "DIMAS MOZART E SILVA PROFESSOR",
            "EMILIO IMMOOS PADRE",
            "ERUCE PAULUCCI PROFESSOR",
            "GUIDO DIAS DE ALMEIDA PROFESSOR",
            "JOAO CRUZ CORONEL",
            "JOAO MICHELIN",
            "JOAO TEIXEIRA DE ARAUJO PROFESSOR",
            "JOSE APARECIDO CASTELUCCI PROFESSOR",
            "JOSE LEITE PINHEIRO PROFESSOR",
            "JOSE PENNA",
            "JOSE PIRES DE CARVALHO DOUTOR",
            "MARIA IZABEL CRUZ PIMENTEL DONA",
            "MATILDE VIEIRA",
            "PAULO ARAUJO NOVAES DOUTOR",
            "PAULO DELICIO",
            "PEDRO BENTO ALVES",
            "PROFESSORA MARIANA APARECIDA TODESCATO",
            "SANDRA APARECIDA DE ARAUJO PROFESSORA"
        ]
    };

    let dadosEscolasCache = {}; 
    let matriculasRede = {}; 
    let matriculasTurmasGlobais = {}; 
    let disciplinasGlobais = new Set();
    
    let modoAtual = 'GERAL';
    let chartInstance = null;
    
    // Estado de Ordenação
    let currentSortCol = 'nome'; // Qual coluna está ordenando
    let currentSortDir = 'asc';  // 'asc' ou 'desc'
    let currentData = [];        // Guarda os dados processados para ordenação rápida

    window.onload = async () => {
        await carregarMatriculasGerais(CONFIG.ARQUIVO_MATRICULAS_REDE, matriculasRede, 'escola');
        await carregarMatriculasGerais(CONFIG.ARQUIVO_MATRICULAS_TURMA, matriculasTurmasGlobais, 'turma');
        await carregarTodasPlanilhasExcel();
        
        const select = document.getElementById('escolaSelect');
        CONFIG.ESCOLAS.forEach(nome => {
            if (dadosEscolasCache[nome]) select.innerHTML += `<option value="${nome}">${nome}</option>`;
        });

        document.getElementById('loadingOverlay').style.display = 'none';
        setModo('GERAL');
    };

    async function fetchAsArrayBuffer(url) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`Arquivo não encontrado: ${url}`);
        return await resp.arrayBuffer();
    }

    async function carregarMatriculasGerais(url, targetObj, tipo) {
        try {
            const buffer = await fetchAsArrayBuffer(url);
            const decoder = new TextDecoder('utf-8');
            const csvStr = decoder.decode(buffer);
            const workbook = XLSX.read(csvStr, {type: 'string'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
            
            jsonData.forEach(row => {
                const keys = Object.keys(row);
                let keyName = keys.find(k => k.toLowerCase().includes(tipo)) || keys[0];
                let keyMatricula = keys.find(k => k.toLowerCase().includes('matricula') || k.toLowerCase().includes('total')) || keys[keys.length - 1];
                
                if (row[keyName] && row[keyMatricula]) {
                    let strLimpa = String(row[keyName]).toUpperCase().trim();
                    if(tipo === 'escola') strLimpa = strLimpa.replace(/\s*-\s*\d+$/, '').trim();
                    
                    targetObj[strLimpa] = parseInt(row[keyMatricula]) || 0;
                }
            });
        } catch(e) {
            console.warn(`Aviso: Arquivo ${url} não encontrado. Assumindo 100% nas participações relativas.`, e);
        }
    }

    async function carregarTodasPlanilhasExcel() {
        for (let i = 0; i < CONFIG.ESCOLAS.length; i++) {
            const nomeEscola = CONFIG.ESCOLAS[i];
            const url = `dados/${nomeEscola}.xlsx`;
            document.getElementById('loadingSubtext').innerText = `Processando: ${nomeEscola} (${i+1}/${CONFIG.ESCOLAS.length})`;
            
            try {
                const buffer = await fetchAsArrayBuffer(url);
                const workbook = XLSX.read(buffer, {type: 'array'});
                let turmasData = [];

                workbook.SheetNames.forEach(sheetName => {
                    const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {defval: ""});
                    if (sheetData.length === 0) return;
                    
                    const classCol = Object.keys(sheetData[0])[0];
                    sheetData.forEach(row => {
                        if (row[classCol] && row["Total de Alunos"]) {
                            turmasData.push(row);
                            Object.keys(row).forEach(h => {
                                if (h.includes("Acertos em")) {
                                    const match = h.match(/Acertos em (.*?)\s*\(/);
                                    if(match) disciplinasGlobais.add(match[1].trim());
                                }
                            });
                        }
                    });
                });
                if (turmasData.length > 0) dadosEscolasCache[nomeEscola] = turmasData;
            } catch(e) {
                console.error(`Falha ao ler Excel de ${nomeEscola}:`, e);
            }
        }
    }

    function setModo(modo) {
        modoAtual = modo;
        document.getElementById('btnTabGeral').classList.toggle('active', modo === 'GERAL');
        document.getElementById('btnTabEscola').classList.toggle('active', modo === 'ESCOLA');
        document.getElementById('escolaControls').style.display = modo === 'ESCOLA' ? 'flex' : 'none';
        
        resetSortAndRender();
    }

    function resetSortAndRender() {
        currentSortCol = 'nome';
        currentSortDir = 'asc';
        if (modoAtual === 'GERAL') processarDadosGeral();
        else processarDadosEscola();
    }

    function handleSort(coluna) {
        if (currentSortCol === coluna) {
            currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
        } else {
            currentSortCol = coluna;
            currentSortDir = 'desc'; // Por padrão, ao clicar num novo numero, mostra os maiores primeiro
            if(coluna === 'nome') currentSortDir = 'asc';
        }
        renderizarTabelaEGratico();
    }

    function getSemaforoClass(pct) {
        if (pct < 0 || isNaN(pct)) return "cell-empty";
        if (pct < 30) return "cell-red";
        if (pct >= 50) return "cell-green";
        return "cell-yellow";
    }

    function getChartColor(pct) {
        if (pct < 0 || isNaN(pct)) return "#cbd5e1";
        if (pct < 30) return "#ef4444"; 
        if (pct >= 50) return "#22c55e"; 
        return "#eab308"; 
    }

    function calcularQtdQuestoes(headerString) {
        const match = headerString.match(/\((Questões.*?)\)/);
        if (match) return (match[1].match(/,/g) || []).length + 1;
        return 1;
    }

    // --- PREPARAÇÃO DE DADOS ---
    let totaisGlobais = {}; // Guarda a linha final de totalização

    function processarDadosGeral() {
        const discArray = Array.from(disciplinasGlobais).sort();
        currentData = [];
        
        let globAlunos = 0, globMatriculas = 0, globAcertos = 0, globPossiveis = 0;
        let globDisc = {};
        discArray.forEach(d => globDisc[d] = { acertos: 0, possiveis: 0 });

        Object.keys(dadosEscolasCache).forEach(nome => {
            const rawData = dadosEscolasCache[nome];
            let escAlunos = 0, escAcertos = 0, escPossiveis = 0;
            let escDisc = {};
            discArray.forEach(d => escDisc[d] = { acertos: 0, possiveis: 0, pct: -1 });
            let turmasContadas = new Set();

            rawData.forEach(row => {
                const turmaNome = String(row[Object.keys(row)[0]]).toUpperCase().trim();
                const pres = parseInt(row["Total de Alunos"]) || 0;
                if (!turmasContadas.has(turmaNome)) { escAlunos += pres; turmasContadas.add(turmaNome); }

                Object.keys(row).forEach(h => {
                    if (h.includes("Acertos em")) {
                        const dNome = h.match(/Acertos em (.*?)\s*\(/)[1].trim();
                        const acertos = parseInt(row[h]) || 0;
                        const possiveis = pres * calcularQtdQuestoes(h);
                        if (escDisc[dNome]) {
                            escDisc[dNome].acertos += acertos; escDisc[dNome].possiveis += possiveis;
                        }
                        escAcertos += acertos; escPossiveis += possiveis;
                    }
                });
            });

            const matrics = matriculasRede[nome] || escAlunos;
            const pctPart = matrics > 0 ? Math.min((escAlunos / matrics) * 100, 100) : 100;
            const mediaGeral = escPossiveis > 0 ? (escAcertos / escPossiveis) * 100 : -1;

            discArray.forEach(d => {
                if(escDisc[d].possiveis > 0) escDisc[d].pct = (escDisc[d].acertos / escDisc[d].possiveis) * 100;
            });

            currentData.push({ nome, escAlunos, matrics, pctPart, escDisc, mediaGeral, escAcertos, escPossiveis });
            
            globAlunos += escAlunos; globMatriculas += matrics; globAcertos += escAcertos; globPossiveis += escPossiveis;
            discArray.forEach(d => { globDisc[d].acertos += escDisc[d].acertos; globDisc[d].possiveis += escDisc[d].possiveis; });
        });

        totaisGlobais = { globAlunos, globMatriculas, globAcertos, globPossiveis, globDisc, discArray };
        renderizarTabelaEGratico();
    }

    function processarDadosEscola() {
        const nomeEscola = document.getElementById('escolaSelect').value;
        if (!nomeEscola || !dadosEscolasCache[nomeEscola]) return;
        
        const rawData = dadosEscolasCache[nomeEscola];
        const discArray = Array.from(disciplinasGlobais).sort();
        currentData = [];
        let turmasMap = {};

        rawData.forEach(row => {
            const tNome = String(row[Object.keys(row)[0]]).toUpperCase().trim();
            const pres = parseInt(row["Total de Alunos"]) || 0;
            
            if (!turmasMap[tNome]) {
                turmasMap[tNome] = { pres: pres, acertos: 0, possiveis: 0, escDisc: {} };
                discArray.forEach(d => turmasMap[tNome].escDisc[d] = { acertos: 0, possiveis: 0, pct: -1 });
            }

            Object.keys(row).forEach(h => {
                if (h.includes("Acertos em")) {
                    const dNome = h.match(/Acertos em (.*?)\s*\(/)[1].trim();
                    const acertos = parseInt(row[h]) || 0;
                    const possiveis = pres * calcularQtdQuestoes(h);
                    if (turmasMap[tNome].escDisc[dNome]) {
                        turmasMap[tNome].escDisc[dNome].acertos += acertos;
                        turmasMap[tNome].escDisc[dNome].possiveis += possiveis;
                    }
                    turmasMap[tNome].acertos += acertos;
                    turmasMap[tNome].possiveis += possiveis;
                }
            });
        });

        let globAlunos = 0, globMatriculas = 0, globAcertos = 0, globPossiveis = 0;
        let globDisc = {};
        discArray.forEach(d => globDisc[d] = { acertos: 0, possiveis: 0 });

        Object.keys(turmasMap).forEach(tNome => {
            const t = turmasMap[tNome];
            let mat = matriculasTurmasGlobais[tNome];
            if (!mat) {
                const chaveAprx = Object.keys(matriculasTurmasGlobais).find(k => k.includes(tNome) || tNome.includes(k));
                mat = chaveAprx ? matriculasTurmasGlobais[chaveAprx] : t.pres;
            }

            const pctPart = mat > 0 ? Math.min((t.pres / mat) * 100, 100) : 100;
            const mediaGeral = t.possiveis > 0 ? (t.acertos / t.possiveis) * 100 : -1;
            
            discArray.forEach(d => { if(t.escDisc[d].possiveis > 0) t.escDisc[d].pct = (t.escDisc[d].acertos / t.escDisc[d].possiveis) * 100; });

            currentData.push({ nome: tNome, escAlunos: t.pres, matrics: mat, pctPart, escDisc: t.escDisc, mediaGeral });

            globAlunos += t.pres; globMatriculas += mat; globAcertos += t.acertos; globPossiveis += t.possiveis;
            discArray.forEach(d => { globDisc[d].acertos += t.escDisc[d].acertos; globDisc[d].possiveis += t.escDisc[d].possiveis; });
        });

        totaisGlobais = { globAlunos, globMatriculas, globAcertos, globPossiveis, globDisc, discArray };
        renderizarTabelaEGratico();
    }

    function sortArray() {
        currentData.sort((a, b) => {
            let valA, valB;
            if (currentSortCol === 'nome') { valA = a.nome; valB = b.nome; }
            else if (currentSortCol === 'pres') { valA = a.escAlunos; valB = b.escAlunos; }
            else if (currentSortCol === 'mat') { valA = a.matrics; valB = b.matrics; }
            else if (currentSortCol === 'part') { valA = a.pctPart; valB = b.pctPart; }
            else if (currentSortCol === 'media') { valA = a.mediaGeral; valB = b.mediaGeral; }
            else { valA = a.escDisc[currentSortCol].pct; valB = b.escDisc[currentSortCol].pct; }

            if (valA === valB) return a.nome.localeCompare(b.nome);
            if (typeof valA === 'string') return currentSortDir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            return currentSortDir === 'asc' ? valA - valB : valB - valA;
        });
    }

    function renderHeaderCell(key, label, width = "auto") {
        const icone = currentSortCol === key ? (currentSortDir === 'asc' ? '▲' : '▼') : '↕';
        const activeClass = currentSortCol === key ? 'th-active' : '';
        return `<th style="min-width: ${width};" class="${activeClass}" onclick="handleSort('${key}')" title="Clique para ordenar por ${label}">
                    ${label} <span class="sort-icon">${icone}</span>
                </th>`;
    }

    function renderizarTabelaEGratico() {
        sortArray();
        const dArr = totaisGlobais.discArray;
        let htmlRows = "";
        let labels = [], dataPcts = [], bgColors = [];

        currentData.forEach(e => {
            htmlRows += `<tr>
                <td class="col-text">${e.nome}</td>
                <td>${e.escAlunos}</td>
                <td>${e.matrics === e.escAlunos ? "-" : e.matrics}</td>
                <td class="cell-blue">${e.pctPart.toFixed(1).replace('.',',')}%</td>`;

            dArr.forEach(d => {
                const pct = e.escDisc[d].pct;
                htmlRows += `<td class="${getSemaforoClass(pct)}">${pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%"}</td>`;
            });

            htmlRows += `<td class="col-total ${getSemaforoClass(e.mediaGeral)}">${e.mediaGeral === -1 ? "-" : e.mediaGeral.toFixed(1).replace('.',',')+"%"}</td></tr>`;
            
            labels.push(modoAtual === 'GERAL' ? e.nome.split(' ').slice(0,2).join(' ') : e.nome.replace(/(INTEGRAL|MANHA|TARDE|ANUAL|T1|T2|7H|9H|\-|\d{8,})/g, '').trim().substring(0,12));
            dataPcts.push(e.mediaGeral > -1 ? e.mediaGeral.toFixed(1) : 0);
            bgColors.push(getChartColor(e.mediaGeral));
        });

        const labelMain = modoAtual === 'GERAL' ? 'Escola' : 'Turma/Sala';
        let headerHtml = `<table class="data-table"><thead><tr>
            ${renderHeaderCell('nome', labelMain, '250px')}
            ${renderHeaderCell('pres', 'Alunos<br>(Presentes)')}
            ${renderHeaderCell('mat', 'Total<br>Matric.')}
            ${renderHeaderCell('part', 'Particip.<br>(%)')}
        `;
        dArr.forEach(d => headerHtml += renderHeaderCell(d, d));
        headerHtml += `${renderHeaderCell('media', 'Média<br>Geral')}</tr></thead><tbody>`;

        const tg = totaisGlobais;
        let tPart = tg.globMatriculas > 0 ? Math.min((tg.globAlunos / tg.globMatriculas) * 100, 100) : 0;
        let tMedia = tg.globPossiveis > 0 ? (tg.globAcertos / tg.globPossiveis) * 100 : -1;
        
        let totalRow = `<tr class="row-total">
            <td class="col-text">MÉDIA GLOBAL - ${modoAtual === 'GERAL' ? 'REDE' : 'UNIDADE'}</td>
            <td>${tg.globAlunos}</td><td>${tg.globMatriculas}</td><td class="cell-blue">${tPart.toFixed(1).replace('.',',')}%</td>`;
        
        dArr.forEach(d => {
            const pct = tg.globDisc[d].possiveis > 0 ? (tg.globDisc[d].acertos / tg.globDisc[d].possiveis) * 100 : -1;
            totalRow += `<td class="${getSemaforoClass(pct)}">${pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%"}</td>`;
        });
        totalRow += `<td class="col-total ${getSemaforoClass(tMedia)}">${tMedia === -1 ? "-" : tMedia.toFixed(1).replace('.',',')+"%"}</td></tr>`;

        document.getElementById('tabelaArea').innerHTML = headerHtml + totalRow + htmlRows + `</tbody></table>`;
        
        const title = modoAtual === 'GERAL' ? "Média Geral por Escola (%)" : `Média Geral por Turma - ${document.getElementById('escolaSelect').value}`;
        desenharGrafico(labels, dataPcts, bgColors, title);
    }

    function desenharGrafico(labels, data, colors, title) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { type: 'line', label: 'Meta Ideal (50%)', data: Array(labels.length).fill(50), borderColor: '#15803d', borderWidth: 2, borderDash: [5, 5], fill: false, pointRadius: 0 },
                    { type: 'line', label: 'Atenção Crítica (30%)', data: Array(labels.length).fill(30), borderColor: '#b91c1c', borderWidth: 1, borderDash: [2, 2], fill: false, pointRadius: 0 },
                    { type: 'bar', label: title, data: data, backgroundColor: colors, borderRadius: 4 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: 'Acertos (%)' } } },
                plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: function(c) { return c.raw + '%'; } } } }
            }
        });
    }
</script>
</body>
</html>
