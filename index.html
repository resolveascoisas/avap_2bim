<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico AVAP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #0f172a; --secondary: #334155; --accent: #3b82f6; --bg: #f8fafc; --border: #e2e8f0;
            --red-vivid: #dc2626; --yellow-vivid: #facc15; --green-vivid: #16a34a;  
            --red-text: white; --yellow-text: black; --green-text: white;
            --blue-bg: #e0f2fe; --blue-text: #0369a1;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .dashboard-container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); min-height: 80vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; gap: 20px;}
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 60px; width: auto; object-fit: contain; }
        .header-text h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .header-text p { margin: 4px 0 0 0; font-size: 14px; color: var(--secondary); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid var(--border); background: #f1f5f9; border-radius: 6px; font-weight: 600; font-size: 14px; color: var(--secondary); transition: all 0.2s; text-decoration: none;}
        .tab-btn:hover { background: #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .btn-print { background-color: var(--secondary); color: white;}
        .btn-print:hover { background-color: var(--primary); }

        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .controls select { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: 'Inter'; font-size: 14px; min-width: 250px; outline: none; cursor: pointer; }

        .table-wrapper { overflow-x: auto; margin-bottom: 30px; border-radius: 8px; border: 1px solid var(--border); }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; min-width: 1000px;}
        
        .data-table th, .data-table td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 8px 3px; text-align: center; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .data-table thead th { background: var(--primary); color: white; font-weight: 600; padding: 12px 3px; white-space: normal; cursor: pointer; user-select: none; transition: background 0.2s; }
        .data-table thead th:hover { background: #1e293b; }
        .sort-icon { display: inline-block; margin-left: 3px; font-size: 10px; color: #94a3b8; }
        .th-active { background: var(--accent) !important; }
        .th-active .sort-icon { color: white; }

        .col-clas { width: 60px; font-weight: 700; color: var(--secondary); background: #f1f5f9;}
        .col-text { text-align: left !important; font-weight: 600; background: #f8fafc; white-space: normal !important; width: 180px; }
        .col-total { font-weight: 700; border-left: 2px solid #94a3b8 !important; }
        .row-total td { border-top: 2px solid var(--primary); font-weight: 700; background: #f1f5f9; cursor: default; }

        .cell-red { background-color: var(--red-vivid) !important; color: var(--red-text) !important; font-weight: 700; }
        .cell-yellow { background-color: var(--yellow-vivid) !important; color: var(--yellow-text) !important; font-weight: 700; }
        .cell-green { background-color: var(--green-vivid) !important; color: var(--green-text) !important; font-weight: 700; }
        .cell-blue { background: var(--blue-bg) !important; color: var(--blue-text) !important; font-weight: 700; }
        .cell-empty { background: #f8fafc; color: #cbd5e1; }

        .interactive-cell { cursor: pointer; transition: transform 0.1s; }
        .interactive-cell:hover { filter: brightness(0.9); transform: scale(0.98); }
        .rank-text { font-size: 10.5px; font-weight: 600; line-height: 1.2; }

        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 18px; font-weight: 600; color: var(--primary); text-align: center;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background: white; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .dashboard-container { box-shadow: none; padding: 0; margin: 0; width: 100%; max-width: none; border: none;}
            .table-wrapper { border: none; overflow: visible; }
            .data-table { border: none; min-width: 0; width: 100%;}
            .data-table th, .data-table td { border: 1px solid #ccc; font-size: 10pt; padding: 4px 2px;}
            .data-table thead th { background: #e2e8f0 !important; color: black !important; }
            .col-clas { background: #f1f5f9 !important; color: black !important;}
            .row-total td { background: #f1f5f9 !important; border-top: 2px solid black !important;}
            .chart-container { page-break-inside: avoid; margin-top: 20px; height: 300px !important;}
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner" id="loadingSpinner"></div>
    <div id="loadingText">Sincronizando Base de Dados...</div>
    <div id="loadingSubtext" style="font-size: 13px; font-weight: 400; color: var(--secondary); margin-top: 10px; max-width: 600px;">Aguarde, conectando com as escolas.</div>
</div>

<div class="dashboard-container">
    <div class="header">
        <div class="header-left">
            <img src="imagens/logo-ure-avare-site.png" alt="Logo URE Avaré" class="logo-img no-print" onerror="this.style.display='none'">
            <div class="header-text">
                <h1>Painel de Visualização da Avaliação Processual do 2º Bimestre</h1>
                <p>Análise de Desempenho - <b>Dica: Clique sobre a % para ver a colocação da turma no mesmo ano/série.</b></p>
            </div>
        </div>
        <button class="tab-btn btn-print no-print" onclick="window.print()">🖨️ Imprimir (Paisagem)</button>
    </div>

    <div class="tabs no-print">
        <button id="btnTabGeral" class="tab-btn active" onclick="setModo('GERAL')">Ver por escola</button>
        <button id="btnTabEscola" class="tab-btn" onclick="setModo('ESCOLA')">Ver por turma</button>
    </div>

    <div id="escolaControls" class="controls no-print" style="display: none;">
        <label style="font-weight: 600; font-size: 14px;">Filtrar Unidade Escolar:</label>
        <select id="escolaSelect" onchange="resetSortAndRender()"></select>
    </div>

    <div class="table-wrapper" id="tabelaArea"></div>
    
    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    const CONFIG = {
        ARQUIVO_MATRICULAS_REDE: "dados/AVARE.xlsx",    
        ARQUIVO_MATRICULAS_TURMA: "dados/ESCOLAS.xlsx", 
        ESCOLAS: [
            "ABILIO RAPOSO FERRAZ JUNIOR",
            "ASSENTAMENTO ZUMBI DOS PALMARES",
            "AVELINO APARECIDO RIBEIRO DOUTOR",
            "BENE ANDRADE DONA",
            "CELSO FERREIRA DA SILVA PROFESSOR",
            "COTA LEONEL DONA",
            "DIMAS MOZART E SILVA PROFESSOR",
            "EMILIO IMMOOS PADRE",
            "ERUCE PAULUCCI PROFESSOR",
            "GUIDO DIAS DE ALMEIDA PROFESSOR",
            "JOAO CRUZ CORONEL",
            "JOAO MICHELIN",
            "JOAO TEIXEIRA DE ARAUJO PROFESSOR",
            "JOSE APARECIDO CASTELUCCI PROFESSOR",
            "JOSE LEITE PINHEIRO PROFESSOR",
            "JOSE PENNA",
            "JOSE PIRES DE CARVALHO DOUTOR",
            "MARIA IZABEL CRUZ PIMENTEL DONA",
            "MATILDE VIEIRA",
            "PAULO ARAUJO NOVAES DOUTOR",
            "PAULO DELICIO",
            "PEDRO BENTO ALVES",
            "PROFESSORA MARIANA APARECIDA TODESCATO",
            "SANDRA APARECIDA DE ARAUJO PROFESSORA"
        ]
    };

    let dadosEscolasCache = {}; 
    let matriculasRede = {}; 
    let matriculasTurmasGlobais = {}; 
    let disciplinasGlobais = new Set();
    
    let rankingGlobaisEscolas = [];
    let rankingGlobaisTurmas = [];
    
    let modoAtual = 'GERAL';
    let chartInstance = null;
    let currentSortCol = 'media'; 
    let currentSortDir = 'desc';  
    let currentData = [];        
    let totaisGlobais = {}; 

    window.onload = async () => {
        if (window.location.protocol === 'file:') {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('loadingText').innerText = "Acesso Local Bloqueado pelo Navegador";
            document.getElementById('loadingSubtext').innerHTML = "<span style='color:#dc2626; font-weight:bold;'>Erro:</span> Você abriu o arquivo index.html dando dois cliques no computador.<br>Para ler os arquivos Excel, você <b>precisa subir esta pasta para o GitHub Pages</b> ou usar um Servidor Local.";
            return;
        }
        try {
            await carregarMatriculasGerais(CONFIG.ARQUIVO_MATRICULAS_REDE, matriculasRede, 'escola');
            await carregarMatriculasGerais(CONFIG.ARQUIVO_MATRICULAS_TURMA, matriculasTurmasGlobais, 'turma');
            await carregarTodasPlanilhasExcel();
            
            preCalcularTodosRankings();

            const select = document.getElementById('escolaSelect');
            CONFIG.ESCOLAS.forEach(nome => {
                if (dadosEscolasCache[nome]) select.innerHTML += `<option value="${nome}">${nome}</option>`;
            });

            document.getElementById('loadingOverlay').style.display = 'none';
            setModo('GERAL');
        } catch (e) {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('loadingText').innerText = "Erro Crítico ao carregar dados";
            document.getElementById('loadingSubtext').innerText = "Verifique se os arquivos Excel estão exatamente dentro da pasta 'dados/' com os nomes corretos.";
            console.error(e);
        }
    };

    async function fetchAsArrayBuffer(url) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`Arquivo não encontrado: ${url}`);
        return await resp.arrayBuffer();
    }

    async function carregarMatriculasGerais(url, targetObj, tipo) {
        try {
            const buffer = await fetchAsArrayBuffer(url);
            const workbook = XLSX.read(new Uint8Array(buffer), {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, {defval: ""});
            
            jsonData.forEach(row => {
                const keys = Object.keys(row);
                let keyName = keys.find(k => k.toLowerCase().includes(tipo)) || keys[0];
                let keyMatricula = keys.find(k => k.toLowerCase().includes('matricula') || k.toLowerCase().includes('total')) || keys[keys.length - 1];
                if (row[keyName] && row[keyMatricula]) {
                    let strLimpa = String(row[keyName]).toUpperCase().trim();
                    if (tipo === 'escola') strLimpa = strLimpa.replace(/\s*-\s*\d+$/, '').trim(); 
                    targetObj[strLimpa] = parseInt(row[keyMatricula]) || 0;
                }
            });
        } catch(e) { console.warn(`Aviso de matrícula [${url}]`, e); }
    }

    async function carregarTodasPlanilhasExcel() {
        for (let i = 0; i < CONFIG.ESCOLAS.length; i++) {
            const nomeEscola = CONFIG.ESCOLAS[i];
            const url = `dados/${nomeEscola}.xlsx`;
            document.getElementById('loadingSubtext').innerText = `Processando: ${nomeEscola} (${i+1}/${CONFIG.ESCOLAS.length})`;
            try {
                const buffer = await fetchAsArrayBuffer(url);
                const workbook = XLSX.read(new Uint8Array(buffer), {type: 'array'});
                let turmasData = [];
                workbook.SheetNames.forEach(sheetName => {
                    const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {defval: ""});
                    if (sheetData.length === 0) return;
                    const classCol = Object.keys(sheetData[0])[0];
                    sheetData.forEach(row => {
                        if (row[classCol] && row["Total de Alunos"]) {
                            turmasData.push(row);
                            Object.keys(row).forEach(h => {
                                if (h.includes("Acertos em")) {
                                    const match = h.match(/Acertos em (.*?)\s*\(/);
                                    if(match) disciplinasGlobais.add(match[1].trim());
                                }
                            });
                        }
                    });
                });
                if (turmasData.length > 0) dadosEscolasCache[nomeEscola] = turmasData;
            } catch(e) { console.error(`Falha: ${nomeEscola}`, e); }
        }
    }

    // EXTRAI O ANO/SÉRIE DO NOME DA TURMA (Ex: "9º ANO", "2ª SÉRIE") PARA AGRUPAMENTO
    function extrairAnoSerie(nome) {
        const match = nome.match(/([1-9][º°ªa-z]*\s*(?:ANO|S[EÉ]RIE))/i);
        if (match) {
            // Remove espaços e acentos para criar uma chave única de cruzamento robusta (ex: 9ANO, 2SERIE)
            return match[1].toUpperCase().replace(/[^A-Z0-9]/g, '');
        }
        return "OUTROS";
    }

    function preCalcularTodosRankings() {
        const discArray = Array.from(disciplinasGlobais).sort();
        
        Object.keys(dadosEscolasCache).forEach(escola => {
            let turmasMap = {};
            dadosEscolasCache[escola].forEach(row => {
                const tNome = String(row[Object.keys(row)[0]]).toUpperCase().trim();
                const pres = parseInt(row["Total de Alunos"]) || 0;
                
                if (!turmasMap[tNome]) {
                    turmasMap[tNome] = { 
                        escola: escola, 
                        turma: tNome, 
                        anoSerie: extrairAnoSerie(tNome), // Chave para filtrar
                        pres: pres, 
                        acertos: 0, 
                        possiveis: 0, 
                        disc: {} 
                    };
                    discArray.forEach(d => turmasMap[tNome].disc[d] = { acertos: 0, possiveis: 0, pct: -1 });
                }
                
                Object.keys(row).forEach(h => {
                    if (h.includes("Acertos em")) {
                        const dNome = h.match(/Acertos em (.*?)\s*\(/)[1].trim();
                        const acertos = parseInt(row[h]) || 0;
                        const possiveis = pres * calcularQtdQuestoes(h);
                        if (turmasMap[tNome].disc[dNome]) {
                            turmasMap[tNome].disc[dNome].acertos += acertos;
                            turmasMap[tNome].disc[dNome].possiveis += possiveis;
                        }
                        turmasMap[tNome].acertos += acertos;
                        turmasMap[tNome].possiveis += possiveis;
                    }
                });
            });

            Object.keys(turmasMap).forEach(tNome => {
                let t = turmasMap[tNome];
                let mat = matriculasTurmasGlobais[tNome] || t.pres;
                const chaveAprx = Object.keys(matriculasTurmasGlobais).find(k => k.includes(tNome) || tNome.includes(k));
                if(chaveAprx && !matriculasTurmasGlobais[tNome]) mat = matriculasTurmasGlobais[chaveAprx];

                t.pctPart = mat > 0 ? Math.min((t.pres / mat) * 100, 100) : 100;
                t.mediaGeral = t.possiveis > 0 ? (t.acertos / t.possiveis) * 100 : -1;
                discArray.forEach(d => { if(t.disc[d].possiveis > 0) t.disc[d].pct = (t.disc[d].acertos / t.disc[d].possiveis) * 100; });
                
                rankingGlobaisTurmas.push(t);
            });
        });

        Object.keys(dadosEscolasCache).forEach(escola => {
            let e = { nome: escola, pres: 0, acertos: 0, possiveis: 0, disc: {} };
            discArray.forEach(d => e.disc[d] = { acertos: 0, possiveis: 0, pct: -1 });
            
            let tCache = rankingGlobaisTurmas.filter(t => t.escola === escola);
            tCache.forEach(t => {
                e.pres += t.pres; e.acertos += t.acertos; e.possiveis += t.possiveis;
                discArray.forEach(d => { e.disc[d].acertos += t.disc[d].acertos; e.disc[d].possiveis += t.disc[d].possiveis; });
            });
            
            let mat = matriculasRede[escola] || e.pres;
            e.pctPart = mat > 0 ? Math.min((e.pres / mat) * 100, 100) : 100;
            e.mediaGeral = e.possiveis > 0 ? (e.acertos / e.possiveis) * 100 : -1;
            discArray.forEach(d => { if(e.disc[d].possiveis > 0) e.disc[d].pct = (e.disc[d].acertos / e.disc[d].possiveis) * 100; });
            rankingGlobaisEscolas.push(e);
        });
    }

    // RANK CALCULATION COM FILTRO DE ANO/SÉRIE
    function getRank(listaMestre, itemNome, valorProcurado, tipoBusca, field, anoSerieFiltro = null) {
        if(valorProcurado === -1) return "-";
        let validos = [];
        
        listaMestre.forEach(item => {
            // Se for busca de turma, filtra para comparar apenas com a mesma série (e ignora as outras)
            if (tipoBusca === 'turma' && anoSerieFiltro && item.anoSerie !== anoSerieFiltro) return;

            let v = -1;
            if (field === 'mediaGeral') v = item.mediaGeral;
            else if (field === 'pctPart') v = item.pctPart;
            else v = item.disc[field].pct;
            
            if (v !== -1) validos.push({ nome: (tipoBusca === 'escola' ? item.nome : item.turma), val: v });
        });

        validos.sort((a,b) => b.val - a.val);

        let rank = 1;
        for (let i = 0; i < validos.length; i++) {
            if (i > 0 && validos[i].val < validos[i-1].val) rank = i + 1;
            if (validos[i].nome === itemNome) return `${rank}/${validos.length}`;
        }
        return "-";
    }

    window.toggleCellText = function(cell) {
        const isPct = cell.getAttribute('data-showing-pct') === 'true';
        if (isPct) {
            cell.innerHTML = `<span class="rank-text">${cell.getAttribute('data-rank')}</span>`;
            cell.setAttribute('data-showing-pct', 'false');
        } else {
            cell.innerHTML = cell.getAttribute('data-pct');
            cell.setAttribute('data-showing-pct', 'true');
        }
    };

    function setModo(modo) {
        modoAtual = modo;
        document.getElementById('btnTabGeral').classList.toggle('active', modo === 'GERAL');
        document.getElementById('btnTabEscola').classList.toggle('active', modo === 'ESCOLA');
        document.getElementById('escolaControls').style.display = modo === 'ESCOLA' ? 'flex' : 'none';
        resetSortAndRender();
    }

    function resetSortAndRender() {
        currentSortCol = 'media';
        currentSortDir = 'desc';
        if (modoAtual === 'GERAL') processarDadosGeral();
        else processarDadosEscola();
    }

    function handleSort(coluna) {
        if (currentSortCol === coluna) {
            currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
        } else {
            currentSortCol = coluna;
            currentSortDir = 'desc'; 
            if(coluna === 'nome') currentSortDir = 'asc'; 
        }
        renderizarTabelaEGratico();
    }

    function getSemaforoClass(pct) {
        if (pct < 0 || isNaN(pct)) return "cell-empty";
        if (pct < 30) return "cell-red";
        if (pct >= 50) return "cell-green";
        return "cell-yellow";
    }

    function getChartColor(pct) {
        if (pct < 0 || isNaN(pct)) return "#cbd5e1";
        if (pct < 30) return "#dc2626"; 
        if (pct >= 50) return "#16a34a"; 
        return "#facc15"; 
    }

    function calcularQtdQuestoes(headerString) {
        const match = headerString.match(/\((Questões.*?)\)/);
        if (match) return (match[1].match(/,/g) || []).length + 1;
        return 1;
    }

    function processarDadosGeral() {
        currentData = [...rankingGlobaisEscolas];
        let globAlunos = 0, globMatriculas = 0, globAcertos = 0, globPossiveis = 0;
        let globDisc = {};
        const discArray = Array.from(disciplinasGlobais).sort();
        discArray.forEach(d => globDisc[d] = { acertos: 0, possiveis: 0 });

        currentData.forEach(e => {
            globAlunos += e.pres; 
            let mat = matriculasRede[e.nome] || e.pres;
            globMatriculas += mat; 
            globAcertos += e.acertos; globPossiveis += e.possiveis;
            discArray.forEach(d => { globDisc[d].acertos += e.disc[d].acertos; globDisc[d].possiveis += e.disc[d].possiveis; });
            e.escDisc = e.disc; 
        });

        totaisGlobais = { globAlunos, globMatriculas, globAcertos, globPossiveis, globDisc, discArray };
        renderizarTabelaEGratico();
    }

    function processarDadosEscola() {
        const nomeEscola = document.getElementById('escolaSelect').value;
        if (!nomeEscola) return;
        
        currentData = rankingGlobaisTurmas.filter(t => t.escola === nomeEscola);
        
        let globAlunos = 0, globMatriculas = 0, globAcertos = 0, globPossiveis = 0;
        let globDisc = {};
        const discArray = Array.from(disciplinasGlobais).sort();
        discArray.forEach(d => globDisc[d] = { acertos: 0, possiveis: 0 });

        currentData.forEach(t => {
            globAlunos += t.pres; 
            
            let mat = matriculasTurmasGlobais[t.turma] || t.pres;
            const chaveAprx = Object.keys(matriculasTurmasGlobais).find(k => k.includes(t.turma) || t.turma.includes(k));
            if(chaveAprx && !matriculasTurmasGlobais[t.turma]) mat = matriculasTurmasGlobais[chaveAprx];
            
            globMatriculas += mat; 
            globAcertos += t.acertos; globPossiveis += t.possiveis;
            discArray.forEach(d => { globDisc[d].acertos += t.disc[d].acertos; globDisc[d].possiveis += t.disc[d].possiveis; });
            
            t.nome = t.turma; 
            t.escDisc = t.disc; 
        });

        totaisGlobais = { globAlunos, globMatriculas, globAcertos, globPossiveis, globDisc, discArray };
        renderizarTabelaEGratico();
    }

    function sortArray() {
        currentData.sort((a, b) => {
            let valA, valB;
            if (currentSortCol === 'nome') { valA = a.nome; valB = b.nome; }
            else if (currentSortCol === 'pres') { valA = a.pres; valB = b.pres; }
            else if (currentSortCol === 'mat') { valA = (modoAtual==='GERAL'? (matriculasRede[a.nome]||a.pres) : (matriculasTurmasGlobais[a.nome]||a.pres)); valB = (modoAtual==='GERAL'? (matriculasRede[b.nome]||b.pres) : (matriculasTurmasGlobais[b.nome]||b.pres)); }
            else if (currentSortCol === 'part') { valA = a.pctPart; valB = b.pctPart; }
            else if (currentSortCol === 'media') { valA = a.mediaGeral; valB = b.mediaGeral; }
            else { valA = a.escDisc[currentSortCol].pct; valB = b.escDisc[currentSortCol].pct; }

            if (valA === valB) return a.nome.localeCompare(b.nome);
            if (typeof valA === 'string') return currentSortDir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            if (valA === -1) return 1; if (valB === -1) return -1;
            return currentSortDir === 'asc' ? valA - valB : valB - valA;
        });
    }

    function renderHeaderCell(key, label, width = "auto") {
        const icone = currentSortCol === key ? (currentSortDir === 'asc' ? '▲' : '▼') : '↕';
        const activeClass = currentSortCol === key ? 'th-active' : '';
        return `<th style="width: ${width};" class="${activeClass}" onclick="handleSort('${key}')" title="Ordenar por ${label.replace(/<br>/g,' ')}">
                    ${label} <span class="sort-icon">${icone}</span>
                </th>`;
    }

    function generateCellHTML(pctStr, rankUre, rankUe, semaforoClass) {
        if (pctStr === "-") return `<td class="cell-empty">-</td>`;
        
        let rankStr = modoAtual === 'GERAL' ? `URE ${rankUre}` : `URE ${rankUre}<br>UE ${rankUe}`;
        
        return `<td class="${semaforoClass} interactive-cell" title="Clique para ver o Rank!" 
                    data-showing-pct="true" 
                    data-pct="${pctStr}" 
                    data-rank="${rankStr}" 
                    onclick="toggleCellText(this)">${pctStr}</td>`;
    }

    function renderizarTabelaEGratico() {
        sortArray();
        const dArr = totaisGlobais.discArray;
        const totalRegistros = currentData.length;
        let htmlRows = "";
        let labels = [], dataPcts = [], bgColors = [];

        let clas = 0, pClas = 0;

        currentData.forEach((e, index) => {
            clas = index + 1;
            if (index > 0 && currentSortCol !== 'nome') {
                let cVal, pValObj;
                let prevObj = currentData[index - 1];
                if (currentSortCol === 'pres') { cVal = e.pres; pValObj = prevObj.pres; }
                else if (currentSortCol === 'mat') { cVal = (modoAtual==='GERAL'? (matriculasRede[e.nome]||e.pres) : (matriculasTurmasGlobais[e.nome]||e.pres)); pValObj = (modoAtual==='GERAL'? (matriculasRede[prevObj.nome]||prevObj.pres) : (matriculasTurmasGlobais[prevObj.nome]||prevObj.pres)); }
                else if (currentSortCol === 'part') { cVal = e.pctPart; pValObj = prevObj.pctPart; }
                else if (currentSortCol === 'media') { cVal = e.mediaGeral; pValObj = prevObj.mediaGeral; }
                else { cVal = e.escDisc[currentSortCol].pct; pValObj = prevObj.escDisc[currentSortCol].pct; }
                if (cVal === pValObj) clas = pClas; else pClas = clas; 
            } else { pClas = clas; }

            let matrics = modoAtual === 'GERAL' ? (matriculasRede[e.nome]||e.pres) : (matriculasTurmasGlobais[e.nome]||e.pres);
            
            // Passa e.anoSerie para o filtro de URE e UE (garantindo que um 6º ano só compita com 6º ano)
            let anoSerieFiltro = modoAtual === 'GERAL' ? null : e.anoSerie;

            let rUrePart = modoAtual === 'GERAL' ? getRank(rankingGlobaisEscolas, e.nome, e.pctPart, 'escola', 'pctPart') : getRank(rankingGlobaisTurmas, e.nome, e.pctPart, 'turma', 'pctPart', anoSerieFiltro);
            let rUePart = modoAtual === 'GERAL' ? "" : getRank(currentData, e.nome, e.pctPart, 'turma', 'pctPart', anoSerieFiltro);
            
            let partPctStr = e.pctPart.toFixed(1).replace('.',',') + "%";
            let partHtml = generateCellHTML(partPctStr, rUrePart, rUePart, "cell-blue");

            htmlRows += `<tr>
                <td class="col-clas">${currentSortCol === 'nome' ? clas : clas + 'º'}</td>
                <td class="col-text">${e.nome}</td>
                <td>${e.pres}</td>
                <td>${matrics === e.pres ? "-" : matrics}</td>
                ${partHtml}`;

            dArr.forEach(d => {
                const pct = e.escDisc[d].pct;
                let pctStr = pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%";
                
                let rUre = modoAtual === 'GERAL' ? getRank(rankingGlobaisEscolas, e.nome, pct, 'escola', d) : getRank(rankingGlobaisTurmas, e.nome, pct, 'turma', d, anoSerieFiltro);
                let rUe = modoAtual === 'GERAL' ? "" : getRank(currentData, e.nome, pct, 'turma', d, anoSerieFiltro);
                
                htmlRows += generateCellHTML(pctStr, rUre, rUe, getSemaforoClass(pct));
            });

            let mgStr = e.mediaGeral === -1 ? "-" : e.mediaGeral.toFixed(1).replace('.',',')+"%";
            let rUreMg = modoAtual === 'GERAL' ? getRank(rankingGlobaisEscolas, e.nome, e.mediaGeral, 'escola', 'mediaGeral') : getRank(rankingGlobaisTurmas, e.nome, e.mediaGeral, 'turma', 'mediaGeral', anoSerieFiltro);
            let rUeMg = modoAtual === 'GERAL' ? "" : getRank(currentData, e.nome, e.mediaGeral, 'turma', 'mediaGeral', anoSerieFiltro);
            
            htmlRows += generateCellHTML(mgStr, rUreMg, rUeMg, "col-total " + getSemaforoClass(e.mediaGeral));
            htmlRows += `</tr>`;
            
            labels.push(modoAtual === 'GERAL' ? e.nome.split(' ').slice(0,2).join(' ') : e.nome.replace(/(INTEGRAL|MANHA|TARDE|ANUAL|T1|T2|7H|9H|\-|\d{8,})/g, '').trim().substring(0,12));
            
            let chartVal = 0;
            if (disciplinasGlobais.has(currentSortCol)) chartVal = e.escDisc[currentSortCol].pct > -1 ? e.escDisc[currentSortCol].pct.toFixed(1) : 0;
            else if (currentSortCol === 'part') chartVal = e.pctPart.toFixed(1);
            else chartVal = e.mediaGeral > -1 ? e.mediaGeral.toFixed(1) : 0;
            
            dataPcts.push(chartVal);
            
            let colorVal = e.mediaGeral;
            if (disciplinasGlobais.has(currentSortCol)) colorVal = e.escDisc[currentSortCol].pct;
            else if (currentSortCol === 'part') colorVal = e.pctPart >= 95 ? 100 : (e.pctPart < 80 ? 0 : 40); 
            
            bgColors.push(getChartColor(colorVal));
        });

        const labelMain = modoAtual === 'GERAL' ? 'Escola' : 'Turma/Sala';
        
        let headerHtml = `<table class="data-table"><thead><tr>
            <th class="col-clas" title="Classificação">Clas.<br>/${totalRegistros}</th>
            ${renderHeaderCell('nome', labelMain, '180px')}
            ${renderHeaderCell('pres', 'Alunos<br>(Pres.)')}
            ${renderHeaderCell('mat', 'Total<br>Matric.')}
            ${renderHeaderCell('part', 'Part.<br>(%)')}
        `;
        dArr.forEach(d => headerHtml += renderHeaderCell(d, d));
        headerHtml += `${renderHeaderCell('media', 'Média<br>Geral')}</tr></thead><tbody>`;

        const tg = totaisGlobais;
        let tPart = tg.globMatriculas > 0 ? Math.min((tg.globAlunos / tg.globMatriculas) * 100, 100) : 0;
        let tMedia = tg.globPossiveis > 0 ? (tg.globAcertos / tg.globPossiveis) * 100 : -1;
        
        let totalRow = `<tr class="row-total">
            <td colspan="2" class="col-text">MÉDIA GLOBAL - ${modoAtual === 'GERAL' ? 'URE AVARÉ' : 'UNIDADE'}</td>
            <td>${tg.globAlunos}</td><td>${tg.globMatriculas}</td><td class="cell-blue">${tPart.toFixed(1).replace('.',',')}%</td>`;
        
        dArr.forEach(d => {
            const pct = tg.globDisc[d].possiveis > 0 ? (tg.globDisc[d].acertos / tg.globDisc[d].possiveis) * 100 : -1;
            totalRow += `<td class="${getSemaforoClass(pct)}">${pct === -1 ? "-" : pct.toFixed(1).replace('.',',')+"%"}</td>`;
        });
        totalRow += `<td class="col-total ${getSemaforoClass(tMedia)}">${tMedia === -1 ? "-" : tMedia.toFixed(1).replace('.',',')+"%"}</td></tr>`;

        document.getElementById('tabelaArea').innerHTML = headerHtml + totalRow + htmlRows + `</tbody></table>`;
        
        let chartTitle = "Média Geral (%)";
        if (disciplinasGlobais.has(currentSortCol)) chartTitle = `Desempenho em ${currentSortCol} (%)`;
        else if (currentSortCol === 'part') chartTitle = "Taxa de Participação (%)";
        if (modoAtual === 'ESCOLA') chartTitle += ` - ${document.getElementById('escolaSelect').value}`;

        desenharGrafico(labels, dataPcts, bgColors, chartTitle);
    }

    function desenharGrafico(labels, data, colors, title) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { type: 'line', label: 'Meta Ideal (50%)', data: Array(labels.length).fill(50), borderColor: '#16a34a', borderWidth: 2, borderDash: [5, 5], fill: false, pointRadius: 0, order: 1 },
                    { type: 'line', label: 'Atenção Crítica (30%)', data: Array(labels.length).fill(30), borderColor: '#dc2626', borderWidth: 1.5, borderDash: [2, 2], fill: false, pointRadius: 0, order: 1 },
                    { type: 'bar', label: title, data: data, backgroundColor: colors, borderRadius: 4, order: 2 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, max: 100, title: { display: true, text: 'Porcentagem (%)' } },
                    x: { ticks: { font: { size: 10 } } }
                },
                plugins: { 
                    legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } }, 
                    tooltip: { callbacks: { label: function(c) { return c.raw + '%'; } } } 
                }
            }
        });
    }
</script>
</body>
</html>
